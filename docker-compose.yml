services:
  db:
    image: postgres:latest
    container_name: airy-postgres-db
    environment:
      POSTGRES_DB: airy_db
      POSTGRES_USER: airy_user
      POSTGRES_PASSWORD: Forest_Carrot_93@Night
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - C:\Users\brits\Documents\postgres_data:/var/lib/postgresql/data/pgdata
  # airybot:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     args:
  #       PROJECT_PATH: "Bots/AiryBotCode.AiryBot/AiryBotCode.AiryBot.csproj"
  #       DLL_NAME: "AiryBotCode.AiryBot.dll"
  #   depends_on:
  #     - db
  #   restart: always
  #   volumes:
  #     - ./Bots/AiryBotCode.AiryBot/appsettings.json:/app/appsettings.json
  airydevbot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_PATH: "Bots/AiryBotCode.AiryDevBot/AiryBotCode.AiryDevBot.csproj"
        DLL_NAME: "AiryBotCode.AiryDevBot.dll"
        SLN_PATH: "AiryBotCode.sln"
    depends_on:
      - db
      - interpreter-sandbox
    restart: always
    volumes:
      - ./Bots/AiryBotCode.AiryDevBot/appsettings.json:/app/appsettings.json

  interpreter-sandbox:
    image: python:3.10-slim
    container_name: airy-interpreter-sandbox
    working_dir: /sandbox
    volumes:
      - ./sandbox:/sandbox
    command: >
      bash -c "pip install flask &&
               echo 'from flask import Flask, request, jsonify
      import subprocess, os
      app = Flask(__name__)
      @app.route(\"/execute\", methods=[\"POST\"])
      def execute():
          try:
              cmd = request.json.get(\"command\")
              res = subprocess.run(cmd, shell=True, capture_output=True, text=True, timeout=30)
              return jsonify({\"output\": res.stdout, \"error\": res.stderr, \"exit_code\": res.returncode})
          except Exception as e: return jsonify({\"error\": str(e), \"exit_code\": -1})
      @app.route(\"/read\", methods=[\"GET\"])
      def read():
          try:
              path = request.args.get(\"path\")
              if not os.path.exists(path): return jsonify({\"error\": \"File not found\"}), 404
              with open(path, \"r\") as f: return jsonify({\"content\": f.read()})
          except Exception as e: return jsonify({\"error\": str(e)}), 500
      @app.route(\"/write\", methods=[\"POST\"])
      def write():
          try:
              path, content = request.json.get(\"path\"), request.json.get(\"content\")
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, \"w\") as f: f.write(content)
              return jsonify({\"status\": \"ok\"})
          except Exception as e: return jsonify({\"error\": str(e)}), 500
      app.run(host=\"0.0.0.0\", port=5000)' > /app.py && python /app.py"
