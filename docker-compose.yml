services:
  db:
    image: postgres:latest
    container_name: airy-postgres-db
    environment:
      POSTGRES_DB: airy_db
      POSTGRES_USER: airy_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    restart: always

  # Control-panel API (ASP.NET). Reachable internally as api:8080; exposed only
  # through Caddy. Edit AiryBotCode.Api/appsettings.json (mounted) to set secrets.
  api:
    build:
      context: .
      dockerfile: Api.dockerfile
    depends_on:
      - db
    restart: always
    volumes:
      - ./AiryBotCode.Api/appsettings.json:/app/appsettings.json

  # Reverse proxy behind Tailscale: password gate, serves the SPA + /api over
  # plain HTTP on 127.0.0.1:8088. Tailscale Serve/Funnel terminates TLS and
  # proxies to this port.
  caddy:
    build:
      context: .
      dockerfile: Caddy.dockerfile
    depends_on:
      - api
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # Default network (api/db) + the Hive's network so spine/spine-ui resolve.
    networks:
      - default
      - hive

  # airybot:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     args:
  #       PROJECT_PATH: "Bots/AiryBotCode.AiryBot/AiryBotCode.AiryBot.csproj"
  #       DLL_NAME: "AiryBotCode.AiryBot.dll"
  #   depends_on:
  #     - db
  #   restart: always
  #   volumes:
  #     - ./Bots/AiryBotCode.AiryBot/appsettings.json:/app/appsettings.json
  airydevbot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_PATH: "Bots/AiryBotCode.AiryDevBot/AiryBotCode.AiryDevBot.csproj"
        DLL_NAME: "AiryBotCode.AiryDevBot.dll"
        SLN_PATH: "AiryBotCode.sln"
    depends_on:
      - db
    restart: always
    # Reach Postgres by its compose service name; overrides Database:Host in the
    # mounted appsettings.json (which is "localhost" for host runs).
    environment:
      - Database__Host=db
    volumes:
      - ./Bots/AiryBotCode.AiryDevBot/appsettings.json:/app/appsettings.json
    # Default network (db) + the Hive's network so the bot can subscribe to the
    # Wraith tools WS for outbound agent effects (say / ask_user → Hive:EffectsWsUrl).
    networks:
      - default
      - hive
  # airydevbot-arm:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.arm
  #     args:
  #       PROJECT_PATH: "Bots/AiryBotCode.AiryDevBot/AiryBotCode.AiryDevBot.csproj"
  #       DLL_NAME: "AiryBotCode.AiryDevBot.dll"
  #       SLN_PATH: "AiryBotCode.sln"
  #   depends_on:
  #     - db
  #   restart: always
  #   volumes:
  #     - ./Bots/AiryBotCode.AiryDevBot/appsettings.json:/app/appsettings.json
  # 
  # airyguardian:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     args:
  #       PROJECT_PATH: "Bots/AiryBotCode.AiryGuardian/AiryBotCode.AiryGuardian.csproj"
  #       DLL_NAME: "AiryBotCode.AiryGuardian.dll"
  #   depends_on:
  #     - db
  #   restart: always
  #   volumes:
  #     - ./Bots/AiryBotCode.AiryGuardian/appsettings.json:/app/appsettings.json
volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  default:
  # The Hive core stack's network (docker-compose.core.yml in The-Hive). Lets
  # Caddy reach the spine / spine-ui containers by name.
  hive:
    name: hive-core_default
    external: true
